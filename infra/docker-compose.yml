services:
  postgres:
    image: postgres:16
    container_name: sa360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sa360
      POSTGRES_PASSWORD: sa360password
      POSTGRES_DB: sa360
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: sa360-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data: